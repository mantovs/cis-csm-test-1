<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Exames para Estudo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #e3f0ff 0%, #fafcff 100%);
      min-height: 100vh;
    }
    .header-title {
      letter-spacing: 2px;
      font-weight: 700;
      color: #184c8a;
    }
    .option-card {
      transition: transform 0.2s, box-shadow 0.2s;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .option-card:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
    }
    .option-btn-csm {
      background-color: #2563eb;
      border: none;
    }
    .option-btn-cisdf {
      background-color: #10b981;
      border: none;
    }
    .option-btn-csm:hover {
      background-color: #1d4ed8;
    }
    .option-btn-cisdf:hover {
      background-color: #0f766e;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="text-center mb-5">
      <h1 class="header-title mb-2">Exames para estudo</h1>
      <p class="lead">Selecione um dos módulos abaixo para começar a estudar!</p>
    </div>
    <div class="row justify-content-center g-4">
      <div class="col-12 col-md-6 d-flex">
        <div class="card option-card shadow-sm w-100">
          <div class="card-body d-flex flex-column justify-content-between">
            <div>
              <h5 class="card-title text-center">CIS-CSM</h5>
              <p class="card-text text-center">Acesse o módulo CIS-CSM com todos os quizzes do curso.</p>
            </div>
            <a href="./home.html" class="btn btn-primary w-100 mt-2 option-btn-csm">Acessar CIS-CSM</a>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-6 d-flex">
        <div class="card option-card shadow-sm w-100">
          <div class="card-body d-flex flex-column justify-content-between">
            <div>
              <h5 class="card-title text-center">CIS-DF</h5>
              <p class="card-text text-center">Acesse o módulo CIS-DF para estudar os conteúdos desse curso.</p>
            </div>
            <a href="./home-cis-df.html" class="btn btn-success w-100 mt-2 option-btn-cisdf">Acessar CIS-DF</a>
          </div>
        </div>
      </div>
    </div>
    <footer class="mt-5 text-center text-muted">
      <small>Desenvolvido por mantovs • Powered by Bootstrap 5</small>
    </footer>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
